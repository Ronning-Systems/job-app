substitutions:
  _REGION: us-west1
  _DB_INSTANCE: ronning-systems:us-west1:ronning-systems-jobapp

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/jobsync', '.']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jobsync']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'jobsync'
      - '--image=gcr.io/$PROJECT_ID/jobsync'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '${_DB_INSTANCE}'
      - '--set-env-vars'
      - 'MODEL_ENDPOINT=https://ollama.com,MODEL_PARSING=minimax-m2.5:cloud,MODEL_AGENTS=glm-5:cloud,MODEL_GENERATION=kimi-k2.5:cloud,AUTH0_AUDIENCE=https://jobsync/api,CORS_ORIGIN=https://job-app-913142543866.us-west1.run.app'
      - '--set-env-vars'
      - 'AUTH0_DOMAIN=dev-saxftot48835pavp.us.auth0.com'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL:latest,OLLAMA_API_KEY=OLLAMA_API_KEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/jobsync'